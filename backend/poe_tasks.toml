[tasks.fmt]
help = "Format and auto-fix lint issues"
sequence = [
  { cmd = "ruff format ." },
  { cmd = "ruff check . --fix" },
]

[tasks.fmt-check]
help = "Check formatting without modifying files"
cmd = "ruff format . --check"

[tasks.lint]
help = "Run lint checks"
sequence = [
  "fmt-check",
  { cmd = "ruff check ." },
]

[tasks.type]
help = "Run static type checks"
cmd = "mypy src"

[tasks.test]
help = "Run tests"
cmd = "pytest tests"

[tasks.serve]
help = "Run the FastAPI app locally with reload"
cmd = "uvicorn --factory wallet.api.app:create_app --reload"

[tasks.export-openapi]
help = "Export the OpenAPI schema for frontend client generation"
cmd = "python scripts/devex/export_openapi.py"

[tasks.clean]
help = "Remove caches and generated local artifacts"
cmd = "python scripts/devex/clean.py"

[tasks.verify]
help = "Run the read-only verification suite"
sequence = ["lint", "type", "test"]

[tasks.check]
help = "Alias for the read-only verification suite"
sequence = ["verify"]
